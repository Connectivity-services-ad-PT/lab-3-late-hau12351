asyncapi: 3.0.0
info:
  title: Camera Stream Events
  version: 1.0.0
  description: Async events published by Camera Stream service

channels:
  campus.camera.motion:
    address: campus.camera.motion
    messages:
      cameraMotionDetected:
        $ref: '#/components/messages/CameraMotionDetected'
      cameraFrameAnalyzed:
        $ref: '#/components/messages/CameraFrameAnalyzed'

  campus.camera.status:
    address: campus.camera.status
    messages:
      cameraStatusChanged:
        $ref: '#/components/messages/CameraStatusChanged'

components:
  messages:

    CameraMotionDetected:
      payload:
        type: object
        properties:
          eventId:
            type: string
          occurredAt:
            type: string
            format: date-time
          correlationId:
            type: string
          source:
            type: string
          data:
            type: object
            properties:
              cameraId:
                type: string
              zoneId:
                type: string
              confidence:
                type: number
                minimum: 0
                maximum: 1
              imageRef:
                type: string
            required:
              - cameraId
              - zoneId
              - confidence
              - imageRef

    CameraFrameAnalyzed:
      payload:
        type: object
        properties:
          detectionId:
            type: string
          correlationId:
            type: string
          riskLevel:
            type: string

    CameraStatusChanged:
      payload:
        type: object
        properties:
          eventId:
            type: string
          occurredAt:
            type: string
            format: date-time
          correlationId:
            type: string
          data:
            type: object
            properties:
              cameraId:
                type: string
              zoneId:
                type: string
              status:
                type: string
                enum:
                  - ONLINE
                  - OFFLINE
                  - ERROR
              offlineDurationSeconds:
                type: integer